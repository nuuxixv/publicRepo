<!DOCTYPE html>
<html lang="ko" class="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올해 남은 일수 / 출근일수</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'media',
    theme: { extend: { fontFamily: { sans: ['Inter','-apple-system','Apple SD Gothic Neo','Malgun Gothic','sans-serif'] } } } };
</script>
<style>
  body{background:transparent;}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .rise{animation:rise .5s cubic-bezier(.22,1,.36,1) both;}
</style>
</head>
<body class="font-sans antialiased text-zinc-900 dark:text-zinc-50">
  <div class="min-h-screen w-full flex items-center justify-center p-5">
    <div class="w-full max-w-xl flex flex-col gap-4">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- 남은 일수 -->
        <div class="rise rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 shadow-sm p-6"
             style="animation-delay:.02s">
          <div class="flex items-center gap-2 text-sm font-medium text-zinc-500 dark:text-zinc-400">
            <span class="inline-block h-1.5 w-1.5 rounded-full bg-zinc-400 dark:bg-zinc-500"></span>
            올해 남은 일수
          </div>
          <div class="mt-3 flex items-baseline gap-1.5">
            <span id="days" class="text-6xl font-semibold tracking-tighter tabular-nums">–</span>
            <span class="text-xl font-medium text-zinc-500 dark:text-zinc-400">일</span>
          </div>
          <div id="daysSub" class="mt-2 text-xs text-zinc-400 dark:text-zinc-500"></div>
        </div>

        <!-- 남은 출근일 -->
        <div class="rise rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 shadow-sm p-6"
             style="animation-delay:.10s">
          <div class="flex items-center gap-2 text-sm font-medium text-zinc-500 dark:text-zinc-400">
            <span class="inline-block h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
            올해 남은 출근일
          </div>
          <div class="mt-3 flex items-baseline gap-1.5">
            <span id="work" class="text-6xl font-semibold tracking-tighter tabular-nums">–</span>
            <span class="text-xl font-medium text-zinc-500 dark:text-zinc-400">일</span>
          </div>
          <div id="workSub" class="mt-2 text-xs text-zinc-400 dark:text-zinc-500"></div>
        </div>
      </div>

      <!-- 연간 진행률 -->
      <div class="rise rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 shadow-sm p-5"
           style="animation-delay:.18s">
        <div class="flex items-center justify-between text-sm font-medium">
          <span id="progLabel" class="text-zinc-500 dark:text-zinc-400">연간 진행률</span>
          <span id="progPct" class="tabular-nums text-zinc-900 dark:text-zinc-50">–%</span>
        </div>
        <div class="mt-3 h-2 w-full overflow-hidden rounded-full bg-zinc-100 dark:bg-zinc-800">
          <div id="progBar" class="h-full rounded-full bg-zinc-900 dark:bg-zinc-50 transition-all duration-700" style="width:0%"></div>
        </div>
      </div>

      <div id="today" class="text-center text-[11px] text-zinc-400 dark:text-zinc-600"></div>
    </div>
  </div>

<script>
// ── 연도별 공휴일. 매년 초 여기 한 줄만 추가 ──
const HOLIDAYS = {
  2026: ["2026-01-01","2026-02-16","2026-02-17","2026-02-18","2026-03-01","2026-03-02","2026-05-01","2026-05-05","2026-05-24","2026-05-25","2026-06-03","2026-06-06","2026-07-17","2026-08-15","2026-08-17","2026-09-24","2026-09-25","2026-09-26","2026-10-03","2026-10-05","2026-10-09","2026-12-25"]
};

function seoulToday(){
  const p = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Seoul',
    year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
  const g = t => +p.find(x=>x.type===t).value;
  return {y:g('year'), m:g('month'), d:g('day')};
}

function countUp(el, target){
  const dur=700, t0=performance.now();
  function step(t){
    const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,3);
    el.textContent = Math.round(target*e);
    if(k<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function render(animate){
  const {y,m,d} = seoulToday();
  const MS = 86400000;
  const today = Date.UTC(y, m-1, d);
  const yearStart = Date.UTC(y,0,1), yearEnd = Date.UTC(y,11,31);

  const remainingDays = Math.round((yearEnd - today)/MS) + 1;
  const totalDays = Math.round((yearEnd - yearStart)/MS) + 1;
  const passed = totalDays - remainingDays;
  const pct = Math.round(passed/totalDays*1000)/10;

  const hol = HOLIDAYS[y] || null;
  let work = 0;
  for(let t=today; t<=yearEnd; t+=MS){
    const dt=new Date(t), dow=dt.getUTCDay();
    if(dow===0||dow===6) continue;
    if(hol && hol.includes(dt.toISOString().slice(0,10))) continue;
    work++;
  }

  const daysEl=document.getElementById('days'), workEl=document.getElementById('work');
  if(animate){ countUp(daysEl,remainingDays); countUp(workEl,work); }
  else { daysEl.textContent=remainingDays; workEl.textContent=work; }

  document.getElementById('daysSub').textContent = "오늘 포함";
  const ws=document.getElementById('workSub');
  ws.textContent = hol ? "주말·공휴일 제외 · 오늘 포함" : y+"년 공휴일 미등록 (주말만 제외)";
  if(!hol) ws.classList.add('text-amber-600');

  document.getElementById('progLabel').textContent = y+"년 진행률";
  document.getElementById('progPct').textContent = pct+"%";
  document.getElementById('progBar').style.width = pct+"%";
  const iso = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  document.getElementById('today').textContent = "오늘 · "+iso+" (Asia/Seoul)";
}

render(true);
setInterval(()=>render(false), 60000); // 열어두면 자정에 자동 갱신
</script>
</body>
</html>
